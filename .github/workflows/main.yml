name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Remove local properties
        run: sed -i '/org.gradle.java.home/d' gradle.properties

      - name: Build APK
        run: ./gradlew assembleWhatsappRelease -Pminify=false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WaEnhancer-APK
          path: app/build/outputs/apk/whatsapp/release/*.apk
