name: Android CI

on:
  push:
    branches: ["master", "beta"]

jobs:
  check-build-flag:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.flags.outputs.should_build }}
      release_type: ${{ steps.flags.outputs.release_type }}
    steps:
      - name: Detect build flag and release type
        id: flags
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          BRANCH="${GITHUB_REF#refs/heads/}"

          if [[ "$COMMIT_MSG" =~ [[:space:]]--build$ ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ "$BRANCH" == "beta" ]]; then
            echo "release_type=beta" >> "$GITHUB_OUTPUT"
          else
            echo "release_type=stable" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-build-flag
    if: needs.check-build-flag.outputs.should_build == 'true'
    permissions: write-all
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle
          cache-dependency-path: |
            **/*.gradle*
            **/gradle-wrapper.properties
            gradle/libs.versions.toml
            **/gradle.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Remove local properties
        run: sed -i '/org.gradle.java.home/d' gradle.properties

      - name: Calculate and bump version
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          VERSION_CODE="$(grep '^VERSION_CODE=' gradle.properties | cut -d'=' -f2 | tr -d '\r\n')"
          VERSION_NAME="$(grep '^VERSION_NAME=' gradle.properties | cut -d'=' -f2 | tr -d '\r\n')"

          if [[ "$VERSION_NAME" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-beta-([0-9]+))?$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            BETA_NUM="${BASH_REMATCH[5]}"
            BASE_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          else
            echo "Unsupported VERSION_NAME format: $VERSION_NAME"
            exit 1
          fi

          if [[ "$BRANCH" == "beta" ]]; then
            RELEASE_PRERELEASE="true"
            RELEASE_TYPE="BETA"

            # Check if this base version is already released as stable
            if git rev-parse "$BASE_VERSION" >/dev/null 2>&1; then
              # Already released! Move to next version beta-1
              if [ "$PATCH" -eq 9 ]; then
                NEW_PATCH=0
                NEW_MINOR=$((MINOR + 1))
                if [ "$NEW_MINOR" -ge 10 ]; then
                  NEW_MINOR=0
                  NEW_MAJOR=$((MAJOR + 1))
                else
                  NEW_MAJOR="$MAJOR"
                fi
              else
                NEW_PATCH=$((PATCH + 1))
                NEW_MINOR="$MINOR"
                NEW_MAJOR="$MAJOR"
              fi
              NEW_VERSION_NAME="${NEW_MAJOR}.${NEW_MINOR}.${NEW_PATCH}-beta-1"
            elif [ -n "$BETA_NUM" ]; then
              # Not released, just increment beta
              NEW_BETA_NUM=$((BETA_NUM + 1))
              NEW_VERSION_NAME="${BASE_VERSION}-beta-${NEW_BETA_NUM}"
            else
              # Stable format in beta branch but not tagged. Start next version beta.
              if [ "$PATCH" -eq 9 ]; then
                NEW_PATCH=0
                NEW_MINOR=$((MINOR + 1))
                if [ "$NEW_MINOR" -ge 10 ]; then
                  NEW_MINOR=0
                  NEW_MAJOR=$((MAJOR + 1))
                else
                  NEW_MAJOR="$MAJOR"
                fi
              else
                NEW_PATCH=$((PATCH + 1))
                NEW_MINOR="$MINOR"
                NEW_MAJOR="$MAJOR"
              fi
              NEW_VERSION_NAME="${NEW_MAJOR}.${NEW_MINOR}.${NEW_PATCH}-beta-1"
            fi
          else
            # master branch logic
            RELEASE_PRERELEASE="false"
            RELEASE_TYPE="STABLE"

            if [ -n "$BETA_NUM" ]; then
              # If it was a beta, the stable version is just the base version
              NEW_VERSION_NAME="$BASE_VERSION"
            else
              # If it was already stable, increment to next stable
              if [ "$PATCH" -eq 9 ]; then
                NEW_PATCH=0
                NEW_MINOR=$((MINOR + 1))
                if [ "$NEW_MINOR" -ge 10 ]; then
                  NEW_MINOR=0
                  NEW_MAJOR=$((MAJOR + 1))
                else
                  NEW_MAJOR="$MAJOR"
                fi
              else
                NEW_PATCH=$((PATCH + 1))
                NEW_MINOR="$MINOR"
                NEW_MAJOR="$MAJOR"
              fi
              NEW_VERSION_NAME="${NEW_MAJOR}.${NEW_MINOR}.${NEW_PATCH}"
            fi
          fi

          if [[ "$NEW_VERSION_NAME" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)-beta-([0-9]+)$ ]]; then
            BETA_TAIL=$(printf "%02d" "${BASH_REMATCH[4]}")
            NEW_VERSION_CODE="${BASH_REMATCH[1]}${BASH_REMATCH[2]}${BASH_REMATCH[3]}${BETA_TAIL}"
          elif [[ "$NEW_VERSION_NAME" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            NEW_VERSION_CODE="${BASH_REMATCH[1]}${BASH_REMATCH[2]}${BASH_REMATCH[3]}99"
          fi

          sed -i "s/^VERSION_CODE=.*/VERSION_CODE=${NEW_VERSION_CODE}/" gradle.properties
          sed -i "s/^VERSION_NAME=.*/VERSION_NAME=${NEW_VERSION_NAME}/" gradle.properties

          echo "NEW_VERSION_NAME=$NEW_VERSION_NAME" >> "$GITHUB_ENV"
          echo "NEW_VERSION_CODE=$NEW_VERSION_CODE" >> "$GITHUB_ENV"
          echo "RELEASE_PRERELEASE=$RELEASE_PRERELEASE" >> "$GITHUB_ENV"
          echo "RELEASE_TYPE=$RELEASE_TYPE" >> "$GITHUB_ENV"

          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add gradle.properties
          git commit -m "chore(release): bump to ${NEW_VERSION_NAME} (${NEW_VERSION_CODE}) [skip ci]"
          git push

      - name: Setup Google Services
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            # Check if it starts with { (raw JSON) or needs decoding
            if [[ "$GOOGLE_SERVICES_JSON" == \{* ]]; then
              echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
              echo "Google Services: Configuration injected from raw JSON secret"
            else
              echo "$GOOGLE_SERVICES_JSON" | base64 --decode > app/google-services.json
              echo "Google Services: Configuration injected from base64 secret"
            fi
            
            # Verify file exists and is not empty
            if [ -s "app/google-services.json" ]; then
              echo "Google Services: app/google-services.json created successfully"
            else
              echo "::warning::Google Services file was not created or is empty!"
            fi
          else
            echo "Google Services: GOOGLE_SERVICES_JSON secret is missing. Crashlytics will be disabled for this build."
          fi

      - name: Build WhatsApp flavor
        run: |
          BUILD_TASKS="assembleWhatsappRelease"
          if [ -s "app/google-services.json" ]; then
            BUILD_TASKS="$BUILD_TASKS uploadCrashlyticsMappingFileWhatsappRelease"
          fi
          
          if [ -n "${{ secrets.KEY_STORE }}" ]; then
            echo "${{ secrets.KEY_STORE }}" | base64 --decode > release.jks
            ./gradlew $BUILD_TASKS -Pminify=true \
              -PandroidStoreFile=release.jks \
              -PandroidStorePassword='${{ secrets.KEY_STORE_PASSWORD }}' \
              -PandroidKeyAlias='${{ secrets.ALIAS }}' \
              -PandroidKeyPassword='${{ secrets.KEY_PASSWORD }}'
          else
            ./gradlew $BUILD_TASKS -Pminify=true
          fi

      - name: Rename APK to versioned name
        run: |
          mkdir -p release_artifacts
          cp app/build/outputs/apk/whatsapp/release/app-whatsapp-release.apk "release_artifacts/WaEnhancerX-v${{ env.NEW_VERSION_NAME }}.apk"

      - name: Upload WhatsApp flavor artifact
        uses: actions/upload-artifact@v5
        with:
          name: WaEnhancerX-v${{ env.NEW_VERSION_NAME }}.apk
          path: release_artifacts/WaEnhancerX-v${{ env.NEW_VERSION_NAME }}.apk

      - name: Upload to GitHub release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: WaEnhancerX v${{ env.NEW_VERSION_NAME }}
          body_path: changelog.txt
          files: |
            release_artifacts/WaEnhancerX-v${{ env.NEW_VERSION_NAME }}.apk
          tag_name: ${{ env.NEW_VERSION_NAME }}
          prerelease: ${{ env.RELEASE_PRERELEASE }}

      - name: Upload to Xposed Repo release
        uses: softprops/action-gh-release@v2
        with:
          repository: Xposed-Modules-Repo/com.waenhancer
          token: ${{ secrets.XPOSED_REPO_TOKEN }}
          name: WaEnhancerX v${{ env.NEW_VERSION_NAME }}
          body_path: changelog.txt
          files: |
            release_artifacts/WaEnhancerX-v${{ env.NEW_VERSION_NAME }}.apk
          tag_name: ${{ env.NEW_VERSION_NAME }}
          prerelease: ${{ env.RELEASE_PRERELEASE }}

      - name: Read changelog
        id: changelog
        run: |
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64 | tr -dc 'a-zA-Z0-9')
          echo "body<<$EOF" >> "$GITHUB_OUTPUT"
          sed '/./,$!d' changelog.txt >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Post release to Telegram
        if: env.RELEASE_PRERELEASE == 'false'
        env:
          CHANGELOG_BODY: ${{ steps.changelog.outputs.body }}
          RELEASE_URL: ${{ steps.release.outputs.url }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHANNEL_ID" ]; then
            echo "Telegram credentials missing. Skipping notification."
            exit 0
          fi
          
          CLEAN_BODY=$(printf '%s' "$CHANGELOG_BODY" | sed '/./,$!d' | cut -c 1-4000)
          FULL_MESSAGE="$(printf 'STABLE %s\n\n%s\n\nRelease: %s' "${{ env.NEW_VERSION_NAME }}" "$CLEAN_BODY" "$RELEASE_URL")"

          curl -f -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHANNEL_ID}" \
            --data-urlencode "text=$FULL_MESSAGE" \
            -d "disable_web_page_preview=true"
