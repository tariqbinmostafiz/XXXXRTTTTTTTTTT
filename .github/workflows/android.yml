name: Android CI

on:
  push:
    branches: ["master", "beta"]

jobs:
  check-build-flag:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.flags.outputs.should_build }}
      release_type: ${{ steps.flags.outputs.release_type }}
    steps:
      - name: Detect build flag and release type
        id: flags
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          BRANCH="${GITHUB_REF#refs/heads/}"

          if [[ "$COMMIT_MSG" =~ [[:space:]]--build$ ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ "$BRANCH" == "beta" ]]; then
            echo "release_type=beta" >> "$GITHUB_OUTPUT"
          else
            echo "release_type=stable" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-build-flag
    if: needs.check-build-flag.outputs.should_build == 'true'
    permissions: write-all
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle
          cache-dependency-path: |
            **/*.gradle*
            **/gradle-wrapper.properties
            gradle/libs.versions.toml
            **/gradle.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Remove local properties
        run: sed -i '/org.gradle.java.home/d' gradle.properties

      - name: Calculate and bump version
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          VERSION_CODE="$(grep '^VERSION_CODE=' gradle.properties | cut -d'=' -f2 | tr -d '\r\n')"
          VERSION_NAME="$(grep '^VERSION_NAME=' gradle.properties | cut -d'=' -f2 | tr -d '\r\n')"

          if [[ "$BRANCH" == "beta" ]]; then
            RELEASE_PRERELEASE="true"

            if [[ "$VERSION_NAME" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-beta-([0-9]+)$ ]]; then
              BASE_VERSION="${BASH_REMATCH[1]}"
              BETA_NUM="${BASH_REMATCH[2]}"
              NEW_BETA_NUM=$((BETA_NUM + 1))
              NEW_VERSION_NAME="${BASE_VERSION}-beta-${NEW_BETA_NUM}"
            elif [[ "$VERSION_NAME" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              MAJOR="${BASH_REMATCH[1]}"
              MINOR="${BASH_REMATCH[2]}"
              PATCH="${BASH_REMATCH[3]}"

              if [ "$PATCH" -eq 9 ]; then
                NEW_PATCH=0
                NEW_MINOR=$((MINOR + 1))
                if [ "$NEW_MINOR" -ge 10 ]; then
                  NEW_MINOR=0
                  NEW_MAJOR=$((MAJOR + 1))
                else
                  NEW_MAJOR="$MAJOR"
                fi
              else
                NEW_PATCH=$((PATCH + 1))
                NEW_MINOR="$MINOR"
                NEW_MAJOR="$MAJOR"
              fi

              NEW_VERSION_NAME="${NEW_MAJOR}.${NEW_MINOR}.${NEW_PATCH}-beta-1"
            else
              echo "Unsupported VERSION_NAME format for beta branch: $VERSION_NAME"
              exit 1
            fi

            RELEASE_TYPE="BETA"
          else
            RELEASE_PRERELEASE="false"

            BASE_VERSION="$VERSION_NAME"
            if [[ "$BASE_VERSION" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-beta-[0-9]+$ ]]; then
              BASE_VERSION="${BASH_REMATCH[1]}"
            fi

            if [[ ! "$BASE_VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "Unsupported VERSION_NAME format for master branch: $VERSION_NAME"
              exit 1
            fi

            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"

            if [ "$PATCH" -eq 9 ]; then
              NEW_PATCH=0
              NEW_MINOR=$((MINOR + 1))
              if [ "$NEW_MINOR" -ge 10 ]; then
                NEW_MINOR=0
                NEW_MAJOR=$((MAJOR + 1))
              else
                NEW_MAJOR="$MAJOR"
              fi
            else
              NEW_PATCH=$((PATCH + 1))
              NEW_MINOR="$MINOR"
              NEW_MAJOR="$MAJOR"
            fi

            NEW_VERSION_NAME="${NEW_MAJOR}.${NEW_MINOR}.${NEW_PATCH}"
            RELEASE_TYPE="STABLE"
          fi

          if [[ "$NEW_VERSION_NAME" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)-beta-([0-9]+)$ ]]; then
            BETA_TAIL=$(printf "%02d" "${BASH_REMATCH[4]}")
            NEW_VERSION_CODE="${BASH_REMATCH[1]}${BASH_REMATCH[2]}${BASH_REMATCH[3]}${BETA_TAIL}"
          elif [[ "$NEW_VERSION_NAME" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            NEW_VERSION_CODE="${BASH_REMATCH[1]}${BASH_REMATCH[2]}${BASH_REMATCH[3]}99"
          fi

          sed -i "s/^VERSION_CODE=.*/VERSION_CODE=${NEW_VERSION_CODE}/" gradle.properties
          sed -i "s/^VERSION_NAME=.*/VERSION_NAME=${NEW_VERSION_NAME}/" gradle.properties

          echo "NEW_VERSION_NAME=$NEW_VERSION_NAME" >> "$GITHUB_ENV"
          echo "NEW_VERSION_CODE=$NEW_VERSION_CODE" >> "$GITHUB_ENV"
          echo "RELEASE_PRERELEASE=$RELEASE_PRERELEASE" >> "$GITHUB_ENV"
          echo "RELEASE_TYPE=$RELEASE_TYPE" >> "$GITHUB_ENV"

          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add gradle.properties
          git commit -m "chore(release): bump to ${NEW_VERSION_NAME} (${NEW_VERSION_CODE}) [skip ci]"
          git push

      - name: Build WhatsApp flavor
        run: |
          if [ -n "${{ secrets.KEY_STORE }}" ]; then
            echo "${{ secrets.KEY_STORE }}" | base64 --decode > release.jks
            ./gradlew assembleWhatsappRelease -Pminify=true \
              -PandroidStoreFile=release.jks \
              -PandroidStorePassword='${{ secrets.KEY_STORE_PASSWORD }}' \
              -PandroidKeyAlias='${{ secrets.ALIAS }}' \
              -PandroidKeyPassword='${{ secrets.KEY_PASSWORD }}'
          else
            ./gradlew assembleWhatsappRelease -Pminify=true
          fi

      - name: Rename APK to versioned name
        run: |
          mkdir -p release_artifacts
          cp app/build/outputs/apk/whatsapp/release/app-whatsapp-release.apk "release_artifacts/WaEnhancer-v${{ env.NEW_VERSION_NAME }}.apk"

      - name: Upload WhatsApp flavor artifact
        uses: actions/upload-artifact@v5
        with:
          name: WaEnhancer-v${{ env.NEW_VERSION_NAME }}.apk
          path: release_artifacts/WaEnhancer-v${{ env.NEW_VERSION_NAME }}.apk

      - name: Upload to GitHub release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: WaEnhancer ${{ env.NEW_VERSION_NAME }}
          body_path: changelog.txt
          files: |
            release_artifacts/WaEnhancer-v${{ env.NEW_VERSION_NAME }}.apk
          tag_name: ${{ env.NEW_VERSION_NAME }}
          prerelease: ${{ env.RELEASE_PRERELEASE }}

